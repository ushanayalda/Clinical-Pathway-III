<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Clinical Pathway</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip" href="#app">Skip to content</a>
  <div id="app" aria-live="polite" aria-busy="true"></div>
  <dialog id="confirm-dialog" aria-labelledby="dialog-title">
    <form method="dialog">
      <h2 id="dialog-title">Finish and lock this attempt?</h2>
      <p>You will not be able to reveal more information in this attempt. Review will unlock after you finish.</p>
      <div class="dialog-actions">
        <button value="cancel" class="button secondary">Continue station</button>
        <button value="finish" class="button danger">Finish station</button>
      </div>
    </form>
  </dialog>
  <script type="module" src="app.js"></script>
</body>
</html>

name: Deploy Clinical Pathway site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Report workflow start
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body: `## GitHub Pages deployment started\n\nCommit: \`${context.sha.slice(0, 12)}\``
            });

  deploy:
    needs: probe
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build public artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/assets/data/case-001
          cp index.html app.js styles.css .nojekyll _site/
          cp assets/data/library.json _site/assets/data/library.json
          cp assets/data/case-001/station.json _site/assets/data/case-001/station.json
          cp assets/data/case-001/review.json _site/assets/data/case-001/review.json
          test ! -e _site/assets/data/case-001/governance.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    needs: [probe, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Report deployment result
        uses: actions/github-script@v7
        env:
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          script: |
            const ok = process.env.DEPLOY_RESULT === 'success';
            const body = [
              '## GitHub Pages deployment',
              '',
              `Status: **${ok ? 'SUCCESS' : process.env.DEPLOY_RESULT.toUpperCase()}**`,
              ok ? `Live site: ${process.env.PAGE_URL}` : 'Deployment did not complete. Open the Actions run to inspect the failed step.',
              '',
              'The public artifact excludes internal governance, documentation and QA files.',
              'Clinical release remains HOLD.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body
            });

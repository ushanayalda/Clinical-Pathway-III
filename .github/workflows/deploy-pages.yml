name: Deploy Clinical Pathway site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Build learner-facing artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/assets/data/case-001
          cp index.html app.js styles.css styles-v3.css .nojekyll _site/
          cp assets/data/library-v3.json _site/assets/data/library-v3.json
          cp assets/data/case-001/station-v3.json _site/assets/data/case-001/station-v3.json
          cp assets/data/case-001/review-v3.json _site/assets/data/case-001/review-v3.json
          test ! -e _site/assets/data/case-001/governance-v3.json
          test ! -e _site/qa
          test ! -e _site/docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

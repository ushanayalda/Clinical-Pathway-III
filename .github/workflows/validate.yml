name: Case 001 clinical mastery validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Mechanical and data-contract audits
        run: npm test
      - name: Desktop, mobile, accessibility and product simulation
        run: npm run audit:browser
